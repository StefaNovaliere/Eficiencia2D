# Railway / Nixpacks build configuration for the Next.js frontend.
# This tells Nixpacks to treat the project root as a Node.js app
# and ignore the backend-selfhosted/ Dockerfile.

[phases.setup]
nixPkgs = ["nodejs_18"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm run start"
