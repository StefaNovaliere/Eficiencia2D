version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - TRANSLATOR_BIN=/usr/local/bin/skp_translator
      - TRANSLATOR_TIMEOUT_S=120
      - TEMP_DIR=/tmp/eficiencia2d
    volumes:
      - tmp-data:/tmp/eficiencia2d
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  tmp-data:
